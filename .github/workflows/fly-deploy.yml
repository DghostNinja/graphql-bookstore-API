name: Build, Test & Deploy to Fly.io

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_APP: graphql-bookstore
  IMAGE: registry.fly.io/graphql-bookstore:${{ github.sha }}

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show latest commits & changes
        run: |
          echo "=== Local Changes (last 3 commits) ==="
          git log --oneline -3
          echo ""
          echo "=== Files modified in this commit ==="
          git diff --name-only HEAD~1..HEAD 2>/dev/null || git diff --name-only

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Fly.io registry
        run: |
          echo ${{ secrets.FLY_API_TOKEN }} | docker login registry.fly.io -u fly --password-stdin

      - name: Build and Verify Docker image
        run: |
          docker build --no-cache -t ${{ env.IMAGE }} .
          docker run --rm ${{ env.IMAGE }} ls -la bookstore-server

      - name: Run Test Suite
        run: |
          chmod +x test_api.sh flow.sh
          
          # Start postgres for tests
          docker compose -f docker-compose.yml up -d postgres
          sleep 10
          
          # Wait for postgres to be healthy
          until docker compose -f docker-compose.yml exec -T postgres pg_isready -U bookstore_user -d bookstore_db; do
            sleep 2
          done
          
          # Run API with the built image
          docker run -d --name test-bookstore -p 4000:4000 \
            --network host \
            -e DATABASE_URL="postgresql://bookstore_user:bookstore_password@localhost:5432/bookstore_db" \
            -e DB_CONNECTION_STRING="dbname=bookstore_db user=bookstore_user password=bookstore_password host=localhost port=5432" \
            -e JWT_SECRET="CHANGE_ME_IN_PRODUCTION_real_jwt_secret_key_2024" \
            -e PORT="4000" \
            ${{ env.IMAGE }}
          
          sleep 15
          
          echo "=== Running API Security Tests ==="
          API_URL="http://localhost:4000/graphql" ./test_api.sh
          echo ""
          echo "=== Running User Flow Tests ==="
          API_URL="http://localhost:4000/graphql" ./flow.sh
          
          docker stop test-bookstore

      - name: Deploy to Fly.io
        run: |
          docker push ${{ env.IMAGE }}
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          fly deploy --image ${{ env.IMAGE }} --yes

      - name: Verify production deployment
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          sleep 15
          echo "=== Verifying production ==="
          RESPONSE=$(curl -s --max-time 20 https://graphql-bookstore.fly.dev/graphql -d '{"query":"{ books { id title } }"}')
          echo "$RESPONSE" | head -50
          
          if echo "$RESPONSE" | grep -q '"data"'; then
            echo "Production working!"
          else
            echo "Production may have issues"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop test-bookstore 2>/dev/null || true
          docker compose -f docker-compose.yml down 2>/dev/null || true