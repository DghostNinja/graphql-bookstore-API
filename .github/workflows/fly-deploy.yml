name: Build, Test & Deploy to Fly.io

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/graphql
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show latest commits & changes
        run: |
          echo "=== Local Changes (last 3 commits) ==="
          git log --oneline -3
          echo ""
          echo "=== Files modified in this commit ==="
          git diff --name-only HEAD~1..HEAD 2>/dev/null || git diff --name-only

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build FRESH Docker image with LATEST source code
        run: |
          docker build --no-cache -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker build --no-cache -t ${{ env.DOCKER_IMAGE }}:latest .
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Verify built image
        run: |
          echo "=== Verifying Docker image ==="
          docker pull ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker run --rm ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ls -la bookstore-server
          docker inspect ${{ env.DOCKER_IMAGE }}:${{ github.sha }} --format '{{.Config.Cmd}}'

      - name: Test with Docker Compose (fresh image)
        run: |
          echo "=== Testing with Docker Compose ==="
          docker compose -f docker-compose.yml down 2>/dev/null || true
          docker compose -f docker-compose.yml build --no-cache
          docker compose -f docker-compose.yml up -d
          sleep 25
          docker compose ps -a
          
          # Verify container is running
          echo "=== Verifying Docker Compose ==="
          curl -s --max-time 5 http://localhost:4000/graphql -d '{"query":"{ books { id title } }"}' | grep -q "data" && echo "✅ Server responding on port 4000"
          
          # Test health endpoint
          echo "=== Testing health ==="
          curl -s --max-time 10 http://localhost:4000/ | head -50
          
          echo "=== Testing GraphQL ==="
          curl -s --max-time 10 http://localhost:4000/graphql -d '{"query":"{ books { id title } }"}' | head -50

      - name: Run Test Suite
        run: |
          chmod +x test_api.sh flow.sh
          echo "=== Running API Security Tests ==="
          API_URL="http://localhost:4000/graphql" ./test_api.sh
          echo ""
          echo "=== Running User Flow Tests ==="
          API_URL="http://localhost:4000/graphql" ./flow.sh

      - name: Deploy FRESH image to Fly.io
        run: |
          echo "=== Deploying FRESH image to Fly.io ==="
          echo "Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          echo "SHA: ${{ github.sha }}"
          
          # Install flyctl
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          
          # Deploy with fresh image (not cached!)
          fly deploy --image ${{ env.DOCKER_IMAGE }}:${{ github.sha }} --yes

      - name: Verify production deployment
        run: |
          sleep 15
          echo "=== Verifying production ==="
          RESPONSE=$(curl -s --max-time 20 https://graphql-bookstore.fly.dev/graphql -d '{"query":"{ books { id title } }"}')
          echo "$RESPONSE" | head -100
          
          # Check if books are returned
          if echo "$RESPONSE" | grep -q '"data"'; then
            echo "✅ Production working!"
          else
            echo "❌ Production may have issues"
            exit 1
          fi

      - name: Cleanup Docker
        if: always()
        run: |
          docker compose -f docker-compose.yml down 2>/dev/null || true
          docker system prune -f 2>/dev/null || true