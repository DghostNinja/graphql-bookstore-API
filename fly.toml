# fly.toml app configuration file generated for graphql-bookstore
#

app = 'graphql-bookstore'
primary_region = 'iad'

[build]
  image = 'ipsalmy/graphql:latest'

[env]
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  path = "/health"
  interval = "30s"
  timeout = "10s"
  grace_period = "30s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024